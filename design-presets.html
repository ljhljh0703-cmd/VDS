<style>
:root{--bg:#faf7f1;--card:#fff;--ink:#1a1814;--muted:#7a6e5e;--rule:rgba(26,24,20,.14);--accent:#7a1f2d;
--soft:color-mix(in oklab,var(--accent) 10%,transparent);
--fd:'Noto Serif KR',serif;--fb:'IBM Plex Sans KR',-apple-system,sans-serif;--fm:'JetBrains Mono',ui-monospace,monospace;}
[data-theme=dark]{--bg:#14110d;--card:#1c1814;--ink:#f0ebe2;--muted:#a99f8e;--rule:rgba(240,235,226,.15);--accent:#d4566a;--soft:color-mix(in oklab,var(--accent) 18%,transparent);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--fb);line-height:1.6;word-break:keep-all;-webkit-font-smoothing:antialiased;padding:0 20px 80px;transition:background .3s,color .3s;}
.wrap{max-width:1180px;margin:0 auto;}
a{color:inherit;}
a[aria-current="page"]{font-weight:700;text-decoration:underline;text-underline-offset:4px;}
.bar{display:flex;justify-content:space-between;align-items:center;padding:20px 0;}
.brand{font-family:var(--fd);font-weight:700;}.brand .d{color:var(--accent);}
.bar nav{display:flex;gap:14px;align-items:center;font-size:13px;}
.tgl{background:none;border:1px solid var(--rule);border-radius:9999px;width:36px;height:36px;cursor:pointer;color:var(--ink);}
.tgl:hover{border-color:var(--accent);}
header.h{padding:14px 0 22px;border-bottom:1px solid var(--rule);}
h1{font-family:var(--fd);font-size:clamp(26px,4.5vw,40px);font-weight:700;letter-spacing:-.02em;margin-bottom:8px;}
.lede{color:var(--muted);font-size:14.5px;max-width:680px;}
.controls{position:sticky;top:0;background:var(--bg);z-index:6;padding:14px 0;border-bottom:1px solid var(--rule);}
#q{width:100%;padding:11px 14px;border:1px solid var(--rule);border-radius:10px;background:var(--card);color:var(--ink);font-family:var(--fb);font-size:14px;}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tab{font-family:var(--fm);font-size:12px;border:1px solid var(--rule);border-radius:9999px;padding:6px 13px;cursor:pointer;background:var(--card);color:var(--muted);}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.famhead{margin:26px 0 4px;font-family:var(--fd);font-weight:700;font-size:19px;}
.famdesc{color:var(--muted);font-size:13px;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:16px;}
.pc{background:var(--card);border:1px solid var(--rule);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.frame{width:100%;height:312px;overflow:hidden;position:relative;background:#0e0e0e;border-bottom:1px solid var(--rule);}
.frame .mini{position:absolute;top:0;left:50%;transform:translateX(-50%) scale(.70);transform-origin:top center;}
.meta{padding:14px 15px;display:flex;flex-direction:column;gap:7px;}
.meta .nm{font-family:var(--fd);font-weight:700;font-size:16px;}
.meta .en{font-family:var(--fm);font-size:11px;color:var(--muted);}
.kw{display:flex;flex-wrap:wrap;gap:5px;}
.kw span{font-family:var(--fm);font-size:10px;background:var(--soft);color:var(--accent);border-radius:5px;padding:2px 7px;}
.bd{font-size:12px;color:var(--muted);}.bd b{color:var(--ink);font-weight:600;}
.dont{font-size:11.5px;color:var(--muted);}.dont::before{content:'✕ ';color:#c0463f;}
.instr{font-size:12px;background:var(--soft);border-left:2px solid var(--accent);padding:7px 9px;border-radius:0 8px 8px 0;}
.instr b{color:var(--accent);}
.tok{position:relative;background:color-mix(in oklab,var(--ink) 6%,transparent);border-radius:7px;padding:8px 10px;font-family:var(--fm);font-size:11px;}
.tok .cp{position:absolute;top:5px;right:5px;font-size:10px;border:1px solid var(--rule);border-radius:5px;padding:1px 6px;cursor:pointer;background:var(--card);color:var(--muted);}
.src{font-family:var(--fm);font-size:10px;color:var(--muted);}
.count{color:var(--muted);font-size:12px;font-family:var(--fm);margin:14px 0;}
footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--rule);color:var(--muted);font-size:12px;}

/* ================= MINI LANDING SAMPLE (공통) ================= */
.mini{width:360px;height:446px;background:var(--m-bg,#fff);color:var(--m-ink,#1a1814);
  font-family:var(--m-body,'IBM Plex Sans KR',sans-serif);border-radius:var(--m-r,14px);overflow:hidden;
  position:relative;--m-acc:#7a1f2d;--m-mut:#8a8178;--m-card:#f7f5f0;--m-soft:rgba(122,31,45,.1);
  --m-rs:8px;--m-rb:4px 4px 0 0;--m-sh:none;}
.mini *{box-sizing:border-box;}
.mtop{display:flex;align-items:center;gap:7px;padding:13px 18px;border-bottom:1px solid rgba(128,128,128,.18);font-size:12px;}
.mtop .dot{font-weight:700;}.mtop .dot b{color:var(--m-acc);}
.mtop .nav{margin-left:auto;display:flex;gap:11px;color:var(--m-mut);font-size:11px;}
.mtop .mbtn{border:1px solid var(--m-acc);color:var(--m-acc);border-radius:var(--m-rs);padding:3px 9px;font-size:10px;}
.mhero{padding:22px 18px 4px;}
.meyebrow{font-family:var(--m-mono,'JetBrains Mono',monospace);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--m-acc);}
.mini h3{font-family:var(--m-disp,var(--m-body));font-size:27px;line-height:1.07;font-weight:700;margin:8px 0;letter-spacing:-.02em;}
.msub{font-size:12.5px;color:var(--m-mut);}
.mbtns{display:flex;gap:8px;margin-top:14px;}
.mbtns .b1{background:var(--m-acc);color:#fff;border-radius:var(--m-rs);padding:8px 14px;font-size:12px;font-weight:600;box-shadow:var(--m-sh);}
.mbtns .b2{border:1px solid var(--m-acc);color:var(--m-acc);border-radius:var(--m-rs);padding:8px 14px;font-size:12px;background:transparent;}
.mstats{display:flex;gap:8px;padding:18px;}
.mstat{flex:1;}.mstat .v{font-family:var(--m-mono,'JetBrains Mono',monospace);font-size:19px;font-weight:700;}
.mstat .l{font-size:9.5px;color:var(--m-mut);}
.mcard{margin:0 18px;padding:13px;border:1px solid rgba(128,128,128,.2);border-radius:var(--m-r);background:var(--m-card);box-shadow:var(--m-sh);}
.mcard .t{font-weight:600;font-size:13px;}.mcard .d{font-size:11px;color:var(--m-mut);}
.mtag{display:inline-block;margin-top:7px;background:var(--m-soft);color:var(--m-acc);border-radius:6px;padding:2px 8px;font-size:10px;font-family:var(--m-mono,'JetBrains Mono',monospace);}
.mbars{display:flex;align-items:flex-end;gap:7px;height:50px;padding:13px 18px 18px;}
.mbars i{flex:1;background:var(--m-acc);border-radius:var(--m-rb);transform-origin:bottom;}

.s-mono{--m-bg:#15171c;--m-ink:#e8eaed;--m-acc:#e5575c;--m-card:#1d2026;--m-mut:#9aa0a8;--m-soft:rgba(229,87,92,.14);--m-sh:0 2px 8px rgba(0,0,0,.4);}
.s-editorial{--m-bg:#fbfaf7;--m-ink:#111;--m-acc:#b3261e;--m-card:#fff;--m-mut:#666;--m-r:0;--m-rs:0;--m-rb:0;}

.s-narrative{--m-bg:#faf7f1;--m-ink:#1a1814;--m-acc:#7a1f2d;--m-card:#fff;--m-mut:#7a6e5e;--m-disp:'Noto Serif KR',serif;--m-body:'Noto Serif KR',serif;}

.s-glass{--m-bg:#dbe6ff;--m-ink:#0e1b33;--m-acc:#3a5bd0;--m-card:rgba(255,255,255,.45);--m-mut:#4a5a78;--m-r:18px;--m-rs:12px;--m-sh:0 8px 30px rgba(40,60,120,.18);}

.s-terracotta{--m-bg:#f6ede4;--m-ink:#3a2a20;--m-acc:#c4602f;--m-card:#fffaf4;--m-mut:#977f6c;--m-r:16px;--m-rs:10px;--m-sh:0 4px 14px rgba(150,90,40,.12);}
.s-darktech{--m-bg:#0a0e14;--m-ink:#d6f5ff;--m-acc:#00e0c6;--m-card:#10161f;--m-mut:#6b8390;--m-soft:rgba(0,224,198,.14);--m-r:10px;--m-rs:7px;--m-sh:0 0 16px rgba(0,224,198,.25);--m-mono:'JetBrains Mono',monospace;--m-body:'JetBrains Mono',monospace;}

.s-candy{--m-bg:#fff0f6;--m-ink:#5b2348;--m-acc:#ff4d9d;--m-card:#fff;--m-mut:#b07a98;--m-r:22px;--m-rs:9999px;--m-rb:9px 9px 0 0;--m-sh:0 6px 18px rgba(255,77,157,.22);}

.s-sketch{--m-bg:#fcfbf7;--m-ink:#2b2b2b;--m-acc:#c2410c;--m-card:#fff;--m-mut:#777;--m-r:14px;--m-rs:10px;--m-disp:'Gaegu',cursive;--m-body:'Gaegu',cursive;}

.s-swiss{--m-bg:#fff;--m-ink:#111;--m-acc:#e8330a;--m-card:#f4f4f4;--m-mut:#888;--m-r:0;--m-rs:0;--m-rb:0;}
.s-swiss .mhero{padding:26px 18px 4px;}.s-swiss h3{font-weight:700;letter-spacing:-.03em;}

/* ===== SITE systems (실토큰, awesome-design-md MIT) ===== */
.s-claude{--m-bg:#f5f4ed;--m-ink:#141413;--m-acc:#c96442;--m-card:#faf9f5;--m-mut:#5e5d59;--m-soft:rgba(201,100,66,.12);--m-r:16px;--m-rs:10px;--m-sh:0 0 0 1px #e8e6dc;--m-disp:'Noto Serif KR',serif;}

/* ===== PALETTE family (pal-*) on neutral base ===== */
.pal-deepblue{--m-acc:#2f5fae;--m-soft:rgba(47,95,174,.12);}
.pal-terracotta{--m-acc:#c4602f;--m-soft:rgba(196,96,47,.12);}

/* ===== ARCHETYPE family (arch-*) — 레이아웃 강조 차이 ===== */
.arch-narrative{--m-disp:'Noto Serif KR',serif;--m-body:'Noto Serif KR',serif;}
.arch-narrative .mstats,.arch-narrative .mbars{display:none;}

.arch-procedural .mhero{padding:16px 18px 2px;}
.arch-procedural .mstat .v::before{content:'0' counter(s) '  ';counter-increment:s;color:var(--m-acc);}
.arch-procedural .mstats{counter-reset:s;}

/* ===== MOTION family (mot-*) ===== */
.mot-lively .mbars i{animation:dpbar 1.6s ease-in-out infinite alternate;}
.mot-lively .mbars i:nth-child(2){animation-delay:.18s}.mot-lively .mbars i:nth-child(3){animation-delay:.36s}.mot-lively .mbars i:nth-child(4){animation-delay:.54s}.mot-lively .mbars i:nth-child(5){animation-delay:.72s}
.mot-lively .mbtns .b1{animation:dpglow 1.8s ease-in-out infinite;}
@keyframes dpbar{from{transform:scaleY(.45)}to{transform:scaleY(1)}}
@keyframes dpglow{0%,100%{box-shadow:0 0 0 rgba(122,31,45,0)}50%{box-shadow:0 0 16px var(--m-acc)}}
.mot-micro .mbtns .b1{transition:transform .18s;}
.frame:hover .mot-micro .mbtns .b1{transform:translateY(-3px);}
@media(prefers-reduced-motion:reduce){.mot-lively .mbars i,.mot-lively .mbtns .b1{animation:none;}}
</style>

<script>
const SAMPLE=`<div class="mtop"><span class="dot">Brand<b>.</b></span><span class="nav"><span>Work</span><span>About</span></span><span class="mbtn">Contact</span></div>
<div class="mhero"><div class="meyebrow">Knowledge OS</div><h3>학습을 시스템으로</h3><div class="msub">매일의 학습을 구조로 흡수하는 지식 운영체계.</div><div class="mbtns"><span class="b1">시작하기</span><span class="b2">자세히</span></div></div>
<div class="mstats"><div class="mstat"><div class="v">981</div><div class="l">노드</div></div><div class="mstat"><div class="v">1,293</div><div class="l">연결</div></div><div class="mstat"><div class="v">154</div><div class="l">군집</div></div></div>
<div class="mcard"><div class="t">Sub-brain</div><div class="d">게이트로 품질을 지키는 개인 지식 그래프.</div><span class="mtag">#knowledge</span></div>
<div class="mbars"><i style="height:40%"></i><i style="height:70%"></i><i style="height:55%"></i><i style="height:90%"></i><i style="height:65%"></i></div>`;

const FAM={style:"스타일 — 전체 톤(우리 시스템 + 차용 이디엄)",palette:"팔레트 — 액센트 색 (data-palette)",font:"폰트 — 디스플레이/본문 (data-font)",archetype:"아키타입 — 레이아웃 성격 (html-publish)",theme:"테마 — 라이트/다크",motion:"모션 — 강도"};

const DATA=[

let fFam="style", fQ="";
const fams=Object.keys(FAM);
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function tabs(){document.getElementById("tabs").innerHTML=fams.map(f=>`<span class="tab ${fFam===f?'on':''}" data-f="${f}">${FAM[f].split(" — ")[0]}</span>`).join("");}
function match(e){if(fFam&&e.fam!==fFam)return false;
  if(fQ){const h=(e.nm+" "+e.en+" "+e.kw.join(" ")+" "+e.best+" "+e.instr).toLowerCase();if(!h.includes(fQ.toLowerCase()))return false;}return true;}
function pcard(e){return `<div class="pc">
  <div class="frame"><div class="mini ${e.cls}">${SAMPLE}</div></div>
  <div class="meta">
    <div><span class="nm">${esc(e.nm)}</span> <span class="en">${esc(e.en)}</span></div>
    <div class="kw">${e.kw.map(k=>`<span>${esc(k)}</span>`).join("")}</div>
    <div class="bd"><b>적합</b> ${esc(e.best)}</div>
    ${e.dont&&e.dont!=="-"?`<div class="dont">${esc(e.dont)}</div>`:""}
    <div class="instr"><b>이렇게 지시</b> · ${esc(e.instr)}</div>
    <div class="tok"><button class="cp" onclick="cp(this)">복사</button>${esc(e.tok)}</div>
    <div class="src">출처 · ${esc(e.src)}</div>
  </div></div>`;}
function render(){
  const list=DATA.filter(match);
  document.getElementById("count").textContent=`${list.length} 프리셋 · ${FAM[fFam]}`;
  document.getElementById("out").innerHTML=`<div class="grid">${list.map(pcard).join("")||"<p style='color:var(--muted)'>일치 없음</p>"}</div>`;
}
function cp(b){const t=b.parentNode.textContent.replace(/^복사/,"").trim();navigator.clipboard&&navigator.clipboard.writeText(t);b.textContent="✓";setTimeout(()=>b.textContent="복사",1200);}
document.getElementById("q").addEventListener("input",e=>{fQ=e.target.value; if(fQ){fFam="";} render();});
document.addEventListener("click",e=>{const t=e.target.closest(".tab");if(!t)return;fFam=t.dataset.f;fQ="";document.getElementById("q").value="";tabs();render();});
tabs();render();
</script>
